spring.application.name=bibliotecaduoc

server.port=${PORT:8080}

# ===================================
# Configuración Moderna Spring Boot 3.3+ / 2026
# ===================================

# Activar perfil de secretos (carga application-secrets.properties)
spring.profiles.include=secrets

# Virtual Threads (Java 21+) - Mejora rendimiento en I/O
spring.threads.virtual.enabled=true

# Problem Details API (RFC 7807) - DESACTIVADO para usar nuestro GlobalExceptionHandler
spring.mvc.problemdetails.enabled=false

# Logging con formato legible
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Modo strict: lanza error si faltan getters/setters
spring.jackson.serialization.fail-on-empty-beans=true

# ===================================
# PostgreSQL + Hibernate (JPA) - NeonTech
# ===================================
# Las credenciales están en application-secrets.properties (excluido de Git)

spring.datasource.url=jdbc:postgresql://ep-plain-rain-a8wzncnl-pooler.eastus2.azure.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_8GepZKhm5FjL
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraci\u00f3n de Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Pool de conexiones (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Actuator para monitoreo (m\u00e9tricas, health checks)
# management.endpoints.web.exposure.include=health,info,metrics
# management.endpoint.health.show-details=when-authorized

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html